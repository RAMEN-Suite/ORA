name: Release Workflow

on:
  push:
    branches:
      - main

    paths:
      - "client/**"
      - "server/**"
      - "schema/**"
      - ".github/workflows/release.yml"

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  licenses:
    name: Generate Third-Party Notices
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to commit and push the generated THIRD-PARTY-NOTICES.md files back to the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true # zizmor: ignore[artipacked] -- required for git push in a later step
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Generate server notices
        working-directory: server
        run: npx generate-license-file --input package-lock.json --output THIRD-PARTY-NOTICES.md --overwrite
      - name: Generate client notices
        working-directory: client
        run: npx generate-license-file --input package-lock.json --output THIRD-PARTY-NOTICES.md --overwrite
      - name: Commit notices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add server/THIRD-PARTY-NOTICES.md client/THIRD-PARTY-NOTICES.md

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: update third-party notices"
            git push
          fi

  create-tag:
    name: Bump Version and Push Tag
    runs-on: ubuntu-latest
    needs: [licenses]
    outputs:
      version: ${{ steps.bump.outputs.version }}
    permissions:
      contents: write # required to commit and push the updated package.json and tags
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true # zizmor: ignore[artipacked] -- required for git push in a later step
      - name: Determine version bump
        id: bump
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          old_version=$(node -p "require('./server/package.json').version")
          IFS='.' read -r major minor patch <<< "$old_version"
          msg=$(git log -1 --pretty=%B "$COMMIT_SHA")

          if echo "$msg" | grep -iq "#major"; then
            new_version="$((major + 1)).0.0"
          elif echo "$msg" | grep -iq "#minor"; then
            new_version="$major.$((minor + 1)).0"
          else
            new_version="$major.$minor.$((patch + 1))"
          fi

          echo "Old version: $old_version -> New version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
      - name: Write new version to package.json files
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            ['./server/package.json', './client/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            });
          "
      - name: Commit, push and tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -am "chore: bump version to $VERSION"
          git push

          git tag "v$VERSION"
          git push --tags
  container:
    name: Build, Check and Push Container
    runs-on: ubuntu-latest
    needs: [create-tag]
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private
      packages: write # required to push the built image to the Container registry (docker/login-action + build-push-action)
      id-token: write # required for actions/attest to mint a Sigstore OIDC token for keyless signing
      security-events: write # required to upload Trivy's SARIF report to the Security tab (public repos only)
      attestations: write # required for actions/attest to persist build provenance + SBOM attestations
      artifact-metadata: write # required for actions/attest's push-to-registry to create the artifact storage record
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: ./server/Dockerfile
          - name: client
            dockerfile: ./client/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: "v${{ needs.create-tag.outputs.version }}"
          persist-credentials: false
      - name: Setup docker
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=semver,pattern=v{{version}},value=v${{ needs.create-tag.outputs.version }}
            type=semver,pattern=v{{major}}.{{minor}},value=v${{ needs.create-tag.outputs.version }}
            type=sha,format=short
            type=raw,value={{date 'YYYYMMDD'}}
            type=raw,value=latest,enable=true
      - name: Build image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          pull: true
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with Syft
        id: sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.name }}.cdx.json
          upload-artifact: false

      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: "CRITICAL,HIGH"
          limit-severities-for-sarif: true
          exit-code: "0"
          ignore-unfixed: true
      - name: Upload Trivy report to Github Security tab
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-container

      - name: Generate License Report
        env:
          IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/v0.6.7/install.sh | sh -s -- -b /usr/local/bin
          grant -f licenses.json list "$IMAGE_TAG"
      - name: Check image licenses
        run: |
          if jq -e '[.run.targets[].evaluation.findings.packages[].licenses[]?.id // "" | select(test("AGPL"; "i"))] | length > 0' licenses.json > /dev/null; then
            echo "::error::AGPL-licensed package found"
            jq -r '.run.targets[].evaluation.findings.packages[] | select(.licenses[]?.id // "" | test("AGPL"; "i")) | "\(.name) \(.version)"' licenses.json
            exit 1
          fi
          echo "No AGPL licenses found."
      - name: Write license summary
        if: always()
        run: |
          {
            echo "## License Report"
            echo ""
            echo "| License | Packages | Risk |"
            echo "|---|---|---|"
            jq -r '
              [.run.targets[].evaluation.findings.packages[].licenses[]? | select(.id != null)]
              | group_by(.id)
              | map({license: .[0].id, count: length, risk: (.[0].riskCategory // "Unknown")})
              | sort_by(-.count)
              | .[]
              | "| \(.license) | \(.count) | \(.risk) |"
            ' licenses.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push image to registry
        id: push
        env:
          IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker push "${tag}"
          done <<< "$TAGS"

          pushed_digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_TAG" | cut -d'@' -f2)
          echo "digest=$pushed_digest" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: github.event.repository.visibility == 'public'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: github.event.repository.visibility == 'public'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom: sbom-${{ matrix.name }}.cdx.json
          push-to-registry: true
      - name: Upload SBOM and scan report as artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-${{ matrix.name }}-artifacts
          path: |
            sbom-${{ matrix.name }}.cdx.json
            trivy-${{ matrix.name }}.sarif
          retention-days: 120
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    needs: [container]
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private
      packages: read # required for docker login + docker compose pull to authenticate against and pull from the registry
    strategy:
      matrix:
        include:
          - environment: antjebrons
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install SSH Key
        env:
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          printf '%s\n' "$PRIVATE_KEY" > ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          cat >>~/.ssh/config <<END
          Host staging
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/staging.key
          END
      - name: Start Edition Container
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GH_TOKEN" | ssh staging deploy-ora-ed
      - name: Start Publication Container
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GH_TOKEN" | ssh staging deploy-ora-pub

name: Release Workflow

on:
  push:
    branches:
      - main

    paths:
      - "client/**"
      - "server/**"
      - "schema/**"
      - ".github/workflows/release.yml"

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  licenses:
    name: Generate Third-Party Notices
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Generate server notices
        working-directory: server
        run: npx generate-license-file --input package-lock.json --output THIRD-PARTY-NOTICES.md --overwrite
      - name: Generate client notices
        working-directory: client
        run: npx generate-license-file --input package-lock.json --output THIRD-PARTY-NOTICES.md --overwrite
      - name: Commit notices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add server/THIRD-PARTY-NOTICES.md client/THIRD-PARTY-NOTICES.md

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: update third-party notices"
            git push
          fi

  create-tag:
    name: Bump Version and Push Tag
    runs-on: ubuntu-latest
    needs: [licenses]
    outputs:
      version: ${{ steps.bump.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Determine version bump
        id: bump
        run: |
          old_version=$(node -p "require('./server/package.json').version")
          IFS='.' read -r major minor patch <<< "$old_version"
          msg=$(git log -1 --pretty=%B "${{ github.sha }}")

          if echo "$msg" | grep -iq "#major"; then
            new_version="$((major + 1)).0.0"
          elif echo "$msg" | grep -iq "#minor"; then
            new_version="$major.$((minor + 1)).0"
          else
            new_version="$major.$minor.$((patch + 1))"
          fi

          echo "Old version: $old_version -> New version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
      - name: Write new version to package.json files
        run: |
          node -e "
            const fs = require('fs');
            ['./server/package.json', './client/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '${{ steps.bump.outputs.version }}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            });
          "
      - name: Commit, push and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -am "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

          git tag "v${{ steps.bump.outputs.version }}"
          git push --tags
  container:
    name: Build, Check and Push Container
    runs-on: ubuntu-latest
    needs: [create-tag]
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: ./server/Dockerfile
          - name: client
            dockerfile: ./client/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: "v${{ needs.create-tag.outputs.version }}"
      - name: Setup docker
        uses: docker/setup-buildx-action@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=semver,pattern=v{{version}},value=v${{ needs.create-tag.outputs.version }}
            type=semver,pattern=v{{major}}.{{minor}},value=v${{ needs.create-tag.outputs.version }}
            type=sha,format=short
            type=raw,value={{date 'YYYYMMDD'}}
            type=raw,value=latest,enable=true
      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          pull: true
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with Syft
        id: sbom
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.name }}.cdx.json
          upload-artifact: false

      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: "CRITICAL,HIGH"
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload Trivy report to Github Security tab
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-container

      - name: Generate License Report
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/v0.6.7/install.sh | sh -s -- -b /usr/local/bin
          grant -f licenses.json list ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
      - name: Check image licenses
        run: |
          if jq -e '[.run.targets[].evaluation.findings.packages[].licenses[]?.id // "" | select(test("AGPL"; "i"))] | length > 0' licenses.json > /dev/null; then
            echo "::error::AGPL-licensed package found"
            jq -r '.run.targets[].evaluation.findings.packages[] | select(.licenses[]?.id // "" | test("AGPL"; "i")) | "\(.name) \(.version)"' licenses.json
            exit 1
          fi
          echo "No AGPL licenses found."
      - name: Write license summary
        if: always()
        run: |
          {
            echo "## License Report"
            echo ""
            echo "| License | Packages | Risk |"
            echo "|---|---|---|"
            jq -r '
              [.run.targets[].evaluation.findings.packages[].licenses[]? | select(.id != null)]
              | group_by(.id)
              | map({license: .[0].id, count: length, risk: (.[0].riskCategory // "Unknown")})
              | sort_by(-.count)
              | .[]
              | "| \(.license) | \(.count) | \(.risk) |"
            ' licenses.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push image to registry
        id: push
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker push "${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"

          pushed_digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ fromJSON(steps.meta.outputs.json).tags[0] }}" | cut -d'@' -f2)
          echo "digest=$pushed_digest" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest SBOM
        uses: actions/attest@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom: sbom-${{ matrix.name }}.cdx.json
          push-to-registry: true
      - name: Upload SBOM and scan report as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.name }}-artifacts
          path: |
            sbom-${{ matrix.name }}.cdx.json
            trivy-${{ matrix.name }}.sarif
          retention-days: 120
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment: production
    needs: [container]
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - name: antjebrons-publications-environment
            known_hosts: ANTJEBRONS_SSH_KNOWN_HOSTS
            private_key: ANTJEBRONS_SSH_PRIVATE_KEY
            host: ANTJEBRONS_SSH_HOST
            user: ANTJEBRONS_SSH_USER
            path: ANTJEBRONS_PUB_SSH_PATH
          - name: antjebrons-editions-environment
            known_hosts: ANTJEBRONS_SSH_KNOWN_HOSTS
            private_key: ANTJEBRONS_SSH_PRIVATE_KEY
            host: ANTJEBRONS_SSH_HOST
            user: ANTJEBRONS_SSH_USER
            path: ANTJEBRONS_EDI_SSH_PATH
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install SSH Key
        env:
          KNOWN_HOSTS: ${{ secrets[matrix.known_hosts] }}
          PRIVATE_KEY: ${{ secrets[matrix.private_key] }}
          HOST: ${{ secrets[matrix.host] }}
          USER: ${{ secrets[matrix.user] }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "$PRIVATE_KEY" > ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          cat >>~/.ssh/config <<END
          Host staging
          HostName $HOST
          User $USER
          IdentityFile ~/.ssh/staging.key
          END
      - name: Start Container
        env:
          REMOTE_PATH: ${{ secrets[matrix.path] }}
        run: |
          ssh staging bash <<EOF
          cd "$REMOTE_PATH"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker compose pull server client
          docker compose up -d --force-recreate server client
          EOF

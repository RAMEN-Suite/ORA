name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - "schema/**"
      - ".github/workflows/server.yml"
  push:
    paths:
      - "server/**"
      - "schema/**"
      - ".github/workflows/server.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: server

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  node-ci:
    name: node checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check dependency licenses
        run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0"
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format
        continue-on-error: true
      - name: Build
        run: npm run build
  dev-container:
    name: dev container
    needs: [node-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        uses: docker/metadata-action@v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha,format=short
      - name: Build image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: server/dockerfile
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Check image licenses
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/v0.6.7/install.sh | sh -s -- -b /usr/local/bin
          grant check ${{ env.REGISTRY }}/${{ github.repository }}-server:${{ github.sha }}


name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - "schema/**"
      - ".github/workflows/server.yml"
  push:
    paths:
      - "server/**"
      - "schema/**"
      - ".github/workflows/server.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: server

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  node-ci:
    name: node checks
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check dependency licenses
        run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0"
      - name: Generate license report
        if: always()
        run: npx license-checker --excludePrivatePackages --production --markdown --out licenses-npm.md
      - name: Write license summary
        if: always()
        run: |
          {
            echo "## NPM Dependency Licenses"
            echo ""
            echo "### Summary"
            echo ""
            echo "| License | Count |"
            echo "|---|---|"
            npx license-checker --excludePrivatePackages --production --json | jq -r '
              [.[].licenses]
              | flatten
              | group_by(.)
              | map({license: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| \(.license) | \(.count) |"
            '
            echo ""
            echo "<details><summary>Full package list</summary>"
            echo ""
            cat licenses-npm.md
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format
        continue-on-error: true
      - name: Build
        run: npm run build
  dev-container:
    name: dev container
    needs: [node-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private
      packages: write # required to push the built image to the Container registry (docker/login-action + build-push-action)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha,format=short
      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: server/Dockerfile
          push: true
          pull: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload trivy scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy
          path: trivy.sarif
      - name: Upload trivy report to security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif

      - name: Generate License Report
        env:
          IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/v0.6.7/install.sh | sh -s -- -b /usr/local/bin
          grant -f licenses.json list "$IMAGE_TAG"
      - name: Check image licenses
        run: |
          if jq -e '[.run.targets[].evaluation.findings.packages[].licenses[]?.id // "" | select(test("AGPL"; "i"))] | length > 0' licenses.json > /dev/null; then
            echo "::error::AGPL-licensed package found"
            jq -r '.run.targets[].evaluation.findings.packages[] | select(.licenses[]?.id // "" | test("AGPL"; "i")) | "\(.name) \(.version)"' licenses.json
            exit 1
          fi
          echo "No AGPL licenses found."
      - name: Write license summary
        if: always()
        run: |
          {
            echo "## License Report"
            echo ""
            echo "| License | Packages | Risk |"
            echo "|---|---|---|"
            jq -r '
              [.run.targets[].evaluation.findings.packages[].licenses[]? | select(.id != null)]
              | group_by(.id)
              | map({license: .[0].id, count: length, risk: (.[0].riskCategory // "Unknown")})
              | sort_by(-.count)
              | .[]
              | "| \(.license) | \(.count) | \(.risk) |"
            ' licenses.json
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: dev deploy
    runs-on: ubuntu-latest
    environment: development
    needs: [dev-container]
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private
      packages: read # required for docker login + docker compose pull to authenticate against and pull from the registry
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install SSH Key
        env:
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          printf '%s\n' "$PRIVATE_KEY" > ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          cat >>~/.ssh/config <<END
          Host staging
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/staging.key
          END
      - name: Start Container
        env:
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REMOTE_PATH: ${{ secrets.SSH_PATH }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          ssh staging bash <<EOF
          set -euo pipefail
          cd "$REMOTE_PATH"
          echo "$GH_TOKEN" | docker login $REGISTRY -u $ACTOR --password-stdin
          docker compose pull server
          docker compose up -d --force-recreate server
          EOF

name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  push:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"

env:
  REGISTRY: ghcr.io

defaults:
  run:
    working-directory: server

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  node-ci:
    name: Node checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format
      - name: Build
        run: npm run build

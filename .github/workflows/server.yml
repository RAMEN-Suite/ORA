name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - "schema/**"
      - ".github/workflows/server.yml"
  push:
    paths:
      - "server/**"
      - "schema/**"
      - ".github/workflows/server.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: server

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  node-ci:
    name: node checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check dependency licenses
        run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0"
      - name: Generate license report
        if: always()
        run: npx license-checker --production --markdown --out licenses-npm.md
      - name: Write license summary
        if: always()
        run: |
          {
            echo "## NPM Dependency Licenses"
            echo ""
            echo "### Summary"
            echo ""
            echo "| License | Count |"
            echo "|---|---|"
            npx license-checker --production --json | jq -r '
              [.[].licenses]
              | flatten
              | group_by(.)
              | map({license: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| \(.license) | \(.count) |"
            '
            echo ""
            echo "<details><summary>Full package list</summary>"
            echo ""
            cat licenses-npm.md
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format
        continue-on-error: true
      - name: Build
        run: npm run build
  dev-container:
    name: dev container
    needs: [node-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        uses: docker/metadata-action@v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha,format=short
      - name: Build image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: server/dockerfile
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: json
          output: trivy.json
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload trivy scan results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy
          path: trivy.json
      - name: Write scan summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          echo "### Trivy scan results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Package | Installed | Fixed | Vulnerability |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          jq -r '
            .Results[]?.Vulnerabilities[]? |
            "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "-") | [\(.VulnerabilityID)](\(.PrimaryURL // "")) |"
          ' trivy.json >> $GITHUB_STEP_SUMMARY

          count=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy.json)
          if [ "$count" -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No CRITICAL/HIGH vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate License Report
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/v0.6.7/install.sh | sh -s -- -b /usr/local/bin
          grant -f licenses.json list ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
      - name: Check image licenses
        run: |
          if jq -e '[.run.targets[].evaluation.findings.packages[].licenses[]?.id // "" | select(test("AGPL"; "i"))] | length > 0' licenses.json > /dev/null; then
            echo "::error::AGPL-licensed package found"
            jq -r '.run.targets[].evaluation.findings.packages[] | select(.licenses[]?.id // "" | test("AGPL"; "i")) | "\(.name) \(.version)"' licenses.json
            exit 1
          fi
          echo "No AGPL licenses found."
      - name: Write license summary
        if: always()
        run: |
          {
            echo "## License Report"
            echo ""
            echo "| License | Packages | Risk |"
            echo "|---|---|---|"
            jq -r '
              [.run.targets[].evaluation.findings.packages[].licenses[]? | select(.id != null)]
              | group_by(.id)
              | map({license: .[0].id, count: length, risk: (.[0].riskCategory // "Unknown")})
              | sort_by(-.count)
              | .[]
              | "| \(.license) | \(.count) | \(.risk) |"
            ' licenses.json
          } >> "$GITHUB_STEP_SUMMARY"


name: Config Linting

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: config linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Lint Client Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: client/dockerfile
          config: .hadolint.yml
          format: tty
      - name: Lint Server Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: server/dockerfile
          config: .hadolint.yml
          format: tty
      - name: Lint configs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"
          output: trivy-config.json
      - name: Upload Trivy config report
        if: always() && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: trivy-config-${{ github.sha }}
          path: trivy-config.json
          retention-days: 14
      - name: Run gitleaks (Docker)
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.0 \
            detect --source . --redact --report-format json --report-path gitleaks.json
      - name: Upload report
        uses: actions/upload-artifact@v7
        if: always() && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        with:
          name: gitleaks-report
          path: gitleaks.json
          retention-days: 14

  sast-scan:
    name: SAST scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    needs: [lint]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Semgrep
        run: |
          set -o pipefail
          semgrep scan \
          --config p/security-audit \
          --config p/secrets \
          --config p/nodejs \
          --config p/nodejsscan \
          --config p/typescript \
          --severity ERROR \
          --error \
          --sarif \
          --output semgrep.sarif
      - name: Print Semgrep results
        if: failure()
        run: |
          if [ -f semgrep.sarif ]; then
            echo "=== Semgrep blocking findings ==="
            jq -r '
              .runs[].results[]
              | "\(.ruleId) | \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine) | \(.message.text)"
            ' semgrep.sarif
          else
            echo "No semgrep.sarif found"
          fi
      - name: Upload Semgrep results to Github Security tab
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast
      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        if: always() && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/release_workflow')
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14

  deps-osv:
    name: Dependency vulnerabilities (OSV)
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8"
    with:
      upload-sarif: ${{ github.event.repository.visibility == 'public' }}
      fail-on-vuln: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}
    if: github.event.name == 'pull_request'
    needs: [lint]
    permissions:
      contents: read
      actions: read
      security-events: write

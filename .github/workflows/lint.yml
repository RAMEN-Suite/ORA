name: Config Linting

on:
  push:
    branches: [dev, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: config linting
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private
      security-events: write # required for uploading results to code scanning
    runs-on: ubuntu-latest
    if: github.head_ref != 'dev' && github.head_ref != 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint Client Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: client/Dockerfile
          config: .hadolint.yml
          format: tty
      - name: Lint Server Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: server/Dockerfile
          config: .hadolint.yml
          format: tty
      - name: Determine exit code
        id: exit-code
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.ref }}
        run: |
          if [[ "$BASE_REF" == "main" || "$HEAD_REF" == "refs/heads/main" ]]; then
            echo "code=1" >> "$GITHUB_OUTPUT"
          else
            echo "code=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: ${{ steps.exit-code.outputs.code }}
          ignore-unfixed: true
          output: trivy-results.sarif
      - name: Upload trivy report to security tab
        if: always() && github.event.repository.visibility == 'public' && (github.base_ref == 'dev' || github.base_ref == 'main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
      - name: Run gitleaks (docker)
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.0 \
            detect --source . --redact --report-format sarif --report-path gitleaks.sarif
      - name: Upload reports
        if: always() && (github.base_ref == 'dev' || github.base_ref == 'main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scan-results-${{ github.sha }}
          path: |
            trivy-results.sarif
            gitleaks.sarif
          retention-days: 30
      - name: Upload gitleaks report to security tab
        if: always() && github.event.repository.visibility == 'public' && (github.base_ref == 'dev' || github.base_ref == 'main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: gitleaks.sarif
      - name: "Write step summary from SARIF"
        if: always()
        run: |
          if [ ! -f trivy-results.sarif ]; then
            {
              echo "## 🔍 Trivy Scan Summary"
              echo ""
              echo "⚠️ \`trivy-results.sarif\` was not found — the scan step may have failed before producing output. Check the scan step's logs above."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          total=$(jq '[.runs[0].results[]] | length' trivy-results.sarif)
          {
            echo "## 🔍 Trivy Scan Summary"
            echo ""

            if [ "$total" -eq 0 ]; then
              echo "✅ No issues found."
            else
              echo "**Total findings: $total**"
              echo ""
              echo "| Severity | Count |"
              echo "|---|---|"
              jq -r '
                (.runs[0].tool.driver.rules // []) as $rules |
                .runs[0].results[] as $r |
                ($rules[] | select(.id == $r.ruleId) | (.properties.tags[] | select(IN("CRITICAL","HIGH","MEDIUM","LOW","UNKNOWN")))) as $sev |
                $sev
              ' trivy-results.sarif | sort | uniq -c | sort -rn | while read -r count sev; do
                [ -z "$sev" ] && continue
                echo "| $sev | $count |"
              done
              echo ""

              echo "<details>"
              echo "<summary>Show all findings</summary>"
              echo ""
              echo "| Severity | Rule | File | Detail |"
              echo "|---|---|---|---|"
              jq -r '
                (.runs[0].tool.driver.rules // []) as $rules |
                .runs[0].results[] |
                . as $r |
                ($rules[] | select(.id == $r.ruleId) | (.properties.tags[] | select(IN("CRITICAL","HIGH","MEDIUM","LOW","UNKNOWN")))) as $sev |
                [
                  $sev,
                  $r.ruleId,
                  ($r.locations[0].physicalLocation.artifactLocation.uri // "unknown"),
                  ($r.message.text // "" | gsub("\n"; " ") | .[0:90])
                ] | @tsv
              ' trivy-results.sarif | while IFS=$'\t' read -r sev rule file detail; do
                echo "| $sev | $rule | $file | $detail |"
              done
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  sast-scan:
    name: SAST scan
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for actions/checkout to fetch repo contents if this repo is private
      security-events: write # required for uploading results to code scanning
    container:
      image: semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6 # 1.167.0
    if: github.head_ref != 'dev' && github.head_ref != 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Semgrep
        run: |
          set -o pipefail
          semgrep scan \
          --config p/security-audit \
          --config p/secrets \
          --config p/nodejs \
          --config p/nodejsscan \
          --config p/typescript \
          --severity ERROR \
          --error \
          --sarif \
          --output semgrep.sarif
      - name: Print Semgrep results
        if: failure()
        run: |
          if [ -f semgrep.sarif ]; then
            echo "=== Semgrep blocking findings ==="
            jq -r '
              .runs[].results[]
              | "\(.ruleId) | \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine) | \(.message.text)"
            ' semgrep.sarif
          else
            echo "No semgrep.sarif found"
          fi
      - name: Upload Semgrep results to Github Security tab
        if: always() && github.event.repository.visibility == 'public' && (github.base_ref == 'dev' || github.base_ref == 'main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: sast
      - name: Upload SARIF
        if: always() && github.event.repository.visibility == 'public' && (github.base_ref == 'dev' || github.base_ref == 'main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14

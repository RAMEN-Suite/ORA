name: Config Linting

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: config linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Lint Client Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: client/dockerfile
          config: .hadolint.yaml
          format: tty
      - name: Lint Server Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: server/dockerfile
          config: .hadolint.yaml
          format: tty
      - name: Lint configs
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"
          output: trivy-config.json
          version: v0.69.1
      - name: Upload Trivy config report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-${{ github.sha }}
          path: trivy-config.json
          retention-days: 14
      - name: Run gitleaks (Docker)
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.0 \
            detect --source . --redact --report-format json --report-path gitleaks.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks.json

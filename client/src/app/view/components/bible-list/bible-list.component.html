<div class="animate__animated animate__fadeIn">
  <p-list-box
    [options]="books()"
    optionLabel="label"
    optionValue="value"
    scrollHeight="275px"
    [(ngModel)]="activeBook"
    [disabled]="isDisabled()"
    *transloco="let t"
  >
    <ng-template #item let-item>
      <span class="tracking-tight">
        {{ t(item.label) }}
      </span>
    </ng-template>
  </p-list-box>
</div>

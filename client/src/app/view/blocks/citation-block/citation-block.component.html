<p-fieldset styleClass="border-surface-300! bg-surface-100/25! border-x-0! rounded-none! md:px-10! pt-5! px-3! pb-10!" *transloco="let t">
  @if (title()) {
    <ng-template #header>
      <span class="font-bold font-stretch-semi-condensed select-none">
        {{ t(title()) }}
      </span>
    </ng-template>
  }

  <div class="flex flex-col gap-6 px-3">
    <section class="flex flex-col gap-3">
      <div class="border-surface-300 bg-surface-0 border px-6 py-4 leading-relaxed">
        <markdown [data]="t(template(), params())" />
      </div>

      <div class="flex flex-wrap gap-3 print:hidden">
        <p-button
          [icon]="hasCopied() ? 'pi pi-check' : 'pi pi-link'"
          [label]="t('app.shared.citation.copyLink')"
          size="small"
          outlined
          (onClick)="handleCopyLink()"
        />
        <p-button icon="pi pi-file-pdf" [label]="t('app.shared.citation.print')" size="small" outlined (onClick)="handlePrintWindow()" />

        @for (link of links(); track link.href) {
          <p-button [icon]="link.icon" [label]="t(link.label)" size="small" outlined (onClick)="handleOpenLink(link)" />
        }
      </div>
    </section>

    @if (usage()) {
      <section class="flex flex-col gap-2">
        <p class="font-semibold">
          {{ t("app.shared.citation.usage") }}
        </p>

        <markdown [data]="usage()" />
      </section>
    }
  </div>
</p-fieldset>

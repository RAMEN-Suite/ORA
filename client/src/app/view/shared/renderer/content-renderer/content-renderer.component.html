<div class="flex flex-col gap-6 print:gap-2">
  @for (block of blocks(); track block.type + "-" + $index) {
    <div class="border-surface-300 bg-surface-0/75 rounded-md border p-5">
      @switch (block.type) {
        @case ("markdown") {
          <content-markdown [properties]="block.properties" />
        }
      }
    </div>
  }
</div>

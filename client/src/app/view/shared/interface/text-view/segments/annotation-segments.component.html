@for (segment of segments(); track $index) {
  @switch (segment.kind) {
    @case ("text") {
      <ng-container>{{ segment.text }}</ng-container>
    }
    @case ("inline-range") {
      <annotation-inline [segment]="segment" />
    }
    @case ("detached") {
      <annotation-detach [annotation]="segment.annotation" />
    }
    @case ("zero-point") {
      <annotation-detach [annotation]="segment.annotation" />
    }
    @case ("line-break") {
      <br />
    }
  }
}

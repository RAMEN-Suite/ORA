@for (block of blocks(); track $index) {
  @switch (block.type) {
    @case ("headline") {
      <block-headline [properties]="block.properties" [values]="values()" />
    }
    @case ("metadata") {
      <block-metadata [properties]="block.properties" [values]="values()" />
    }
    @case ("text") {
      <block-text [properties]="block.properties" [values]="values()" />
    }
  }
}

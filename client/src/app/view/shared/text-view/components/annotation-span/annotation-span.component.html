<span
  [attr.tabindex]="hasPopover() ? 0 : null"
  [class]="classes()"
  (click)="handleTogglePopover($event)"
  (keydown.enter)="handleTogglePopover($event)"
  (keydown.space)="handleTogglePopover($event)"
>
  <annotation-segments [segments]="segment().children" />
</span>

@if (hasPopover()) {
  <p-popover (onHide)="handleHidePopover()">
    <annotation-popover [annotations]="segment().annotations" [isOpen]="isPopoverOpen()" />
  </p-popover>
}

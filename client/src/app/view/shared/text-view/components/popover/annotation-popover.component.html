<span
  class="relative inline"
  [class]="hostClasses()"
  [attr.role]="hasPopover() ? 'button' : null"
  [attr.tabindex]="hasPopover() ? 0 : null"
  [attr.aria-busy]="isLoading() ? 'true' : null"
  (onActivate)="handleOpen($event)"
>
  <ng-content />
</span>

<p-popover styleClass="annotation-popover-overlay" appendTo="body" (onHide)="handleHide()">
  @for (annotation of activeAnnotations(); track annotation.uuid) {
    <annotation-popover-entry [annotation]="annotation" [view]="getView(annotation)" [isOpen]="isOpen()" />

    @if (!$last) {
      <p-divider />
    }
  }
</p-popover>

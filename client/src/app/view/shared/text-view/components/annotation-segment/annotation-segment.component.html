@let current = segment();

@switch (current.kind) {
  @case ("text") {
    {{ current.text }}
  }

  @case ("inline") {
    <annotation-inline [segment]="current" />
  }

  @case ("interaction") {
    <annotation-interaction [segment]="current" />
  }

  @case ("zero-point") {
    <annotation-zero-point [segment]="current" />
  }
}

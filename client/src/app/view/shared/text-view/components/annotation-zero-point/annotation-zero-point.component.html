@let current = annotation();
@switch (current.definition.behavior) {
  @case ("line-break") {
    <br />
  }
  @case ("page-break") {
    @if (isMargin()) {
      <span #anchor class="inline-block h-[1em] w-0 align-baseline"></span>
    }
    <span #marker [class]="markerClasses()" [ngStyle]="isMargin() ? position() : null">{{ displayLabel() }}</span>
  }
  @case ("gap") {
    <span [class]="classes()">{{ label() }}</span>
  }
}

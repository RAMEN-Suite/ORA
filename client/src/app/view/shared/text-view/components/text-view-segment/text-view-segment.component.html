@if (isStructure(segment())) {
  <annotation-structure [segment]="asStructure(segment())" />
} @else if (isTable(segment())) {
  <annotation-table [segment]="asTable(segment())" />
} @else if (isList(segment())) {
  <annotation-list [segment]="asList(segment())" />
} @else {
  <annotation-segment [segment]="asAnnotation(segment())" />
}

<table [class]="classes()">
  <tbody>
    @for (row of segment().rows; track row.annotation.uuid) {
      <tr [class]="rowClasses(row)">
        @for (cell of row.cells; track cell.annotation.uuid) {
          <td [class]="cellClasses(cell)">
            <annotation-text-view-segments [segments]="cell.children" />
          </td>
        }
      </tr>
    }
  </tbody>
</table>

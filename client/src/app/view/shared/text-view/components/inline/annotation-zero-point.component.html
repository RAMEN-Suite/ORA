@let styleClasses = isMargin() ? marginClasses() + " " + classes() : classes();

@if (isLineBreak()) {
  <br />
} @else {
  @if (isMargin()) {
    <span class="inline-block h-[1em] w-0 align-baseline" #anchor></span>
  }

  <span [class]="styleClasses" [ngStyle]="isMargin() ? marginPosition() : null" #marker> {{ displayLabel() }}</span>
}

<main class="min-h-screen px-6 py-10">
  <div class="mx-auto grid max-w-7xl grid-cols-1 gap-6 lg:grid-cols-[minmax(0,1fr)_350px]">
    <section class="border-surface-300 bg-surface-0/75 rounded-md border p-5">
      <p-table [value]="$collections.value().data">
        <ng-template #header>
          <tr>
            <th>Label</th>
            <th>Attachments</th>
            <th>Variants</th>
            <th>Status</th>
          </tr>
        </ng-template>
        <ng-template #body let-customer let-index="index">
          <tr>
            <td>{{ customer.label }}</td>
            <td>{{ customer.attachments }}</td>
            <td>{{ customer.variants }}</td>
            <td>{{ customer.status }}</td>
          </tr>
        </ng-template>
      </p-table>
    </section>
    <aside class="self-start lg:sticky lg:top-10">
      <div class="flex flex-col gap-5">
        <div class="border-surface-300 bg-surface-0 rounded-md border p-5 select-none"></div>
      </div>
    </aside>
  </div>
</main>

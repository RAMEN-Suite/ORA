@if ($view.isLoading()) {
  <div class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center">
    <p-progress-spinner class="spinner-base" />
  </div>
} @else {
  <div class="animate__animated animate__fadeIn min-h-screen px-6 py-4 md:py-10">
    <div class="mx-auto grid max-w-7xl gap-6 lg:grid-cols-[minmax(0,1fr)_350px]">
      <main class="border-surface-300 bg-surface-0/75 rounded-md border py-10 print:border-0 print:p-0">
        <div class="flex flex-col gap-6 print:gap-2">
          @for (block of blocks(); track block.type + "-" + $index) {
            @switch (block.type) {
              @case ("headline") {
                <block-headline [properties]="block.properties" [values]="values()" />
              }
              @case ("attributes") {
                <block-attributes [properties]="block.properties" [values]="values()" />
              }
              @case ("text") {
                <block-text [properties]="block.properties" [values]="values()" />
              }
              @case ("citation") {
                <block-citation [properties]="block.properties" [values]="values()" [uuid]="uuid()" />
              }
            }
          }
        </div>
      </main>

      <aside class="no-scrollbar order-2 space-y-3 self-start overflow-y-auto lg:sticky lg:top-10 lg:max-h-[calc(100vh-5rem)] print:hidden">
        <!-- Sidebar content -->
        <!-- <div class="border-surface-300 bg-surface-0 rounded-md border p-5 select-none">Text Box 1</div> -->
      </aside>
    </div>
  </div>
}
